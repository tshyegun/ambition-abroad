name: Scrape Visa Data

on:
  schedule:
    - cron: '0 9 1 * *'  # First day of each month at 9am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject knowledge base
        run: node scripts/scrape-visa.js

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add knowledge/visa-data.json visa/index.html
          git diff --staged --quiet || git commit -m "chore: rebuild visa knowledge base $(date -u +%Y-%m-%d)"
          git push
